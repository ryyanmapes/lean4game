name: Build browser Lean libraries

on:
  workflow_dispatch:
    inputs:
      include_nng4:
        description: Also build and package ryyanmapes/NNG4
        required: true
        default: false
        type: boolean

concurrency:
  group: browser-lean-libs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CAULI_LEAN_SHA: 62b6a2291302d4bbeace37642a066b7510d0145c
  CAULI_LEAN_RUN_ID: 29165653896
  CAULI_LEAN_ARTIFACT: build-Linux 32bit
  CAULI_WASM_ARTIFACT: build-Web Assembly
  CAULI_BROWSER_HOST_REF: bd59ee42ca75cdc4947b7b101b845b25da594d93
  # Latest mathlib commit preceding the pinned Cauli Lean build. NNG4's normal
  # manifest targets Lean 4.28 and cannot be compiled by this 4.33-pre toolchain.
  CAULI_MATHLIB_SHA: 9944fe2973b8dc0b86949101ed98232c07cd54a0

jobs:
  build:
    name: GameServer + VisualTest${{ inputs.include_nng4 && ' + NNG4' || '' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Check out lean4game
        uses: actions/checkout@v4

      - name: Require Cauli artifact token
        env:
          CAULI_ARTIFACT_TOKEN: ${{ secrets.CAULI_ARTIFACT_TOKEN }}
        run: |
          if [[ -z "$CAULI_ARTIFACT_TOKEN" ]]; then
            echo '::error::Add CAULI_ARTIFACT_TOKEN as a repository Actions secret. It needs read access to public Actions artifacts.'
            exit 1
          fi

      - name: Check out VisualTest
        run: git clone --depth 1 https://github.com/ryyanmapes/VisualTest ../VisualTest

      - name: Check out pinned browser snapshot host
        uses: actions/checkout@v4
        with:
          repository: cauli/lean4-wasm-in-browser
          ref: ${{ env.CAULI_BROWSER_HOST_REF }}
          path: .cauli-browser-host

      - name: Check out matching Cauli Lean sources
        uses: actions/checkout@v4
        with:
          repository: cauli/lean4
          ref: ${{ env.CAULI_LEAN_SHA }}
          path: .cauli-lean-source

      - name: Check out NNG4
        if: inputs.include_nng4
        run: git clone --depth 1 https://github.com/ryyanmapes/NNG4 ../NNG4

      - name: Download matching Cauli 32-bit compiler
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.CAULI_ARTIFACT_TOKEN }}
          repository: cauli/lean4
          run-id: ${{ env.CAULI_LEAN_RUN_ID }}
          name: ${{ env.CAULI_LEAN_ARTIFACT }}
          path: .cauli-toolchain-download

      - name: Download matching Cauli WebAssembly compiler
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.CAULI_ARTIFACT_TOKEN }}
          repository: cauli/lean4
          run-id: ${{ env.CAULI_LEAN_RUN_ID }}
          name: ${{ env.CAULI_WASM_ARTIFACT }}
          path: .cauli-wasm-download

      - name: Download matching Cauli WebAssembly link kit
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.CAULI_ARTIFACT_TOKEN }}
          repository: cauli/lean4
          run-id: ${{ env.CAULI_LEAN_RUN_ID }}
          name: linkkit-Web Assembly
          path: .cauli-linkkit-download

      - name: Install 32-bit runtime and unpack compiler
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y zstd libc6:i386 libstdc++6:i386 libgcc-s1:i386 libuv1:i386 libssl3t64:i386

          archive="$(find .cauli-toolchain-download -type f -name '*.tar.zst' -print -quit)"
          if [[ -z "$archive" ]]; then
            echo '::error::The Cauli artifact did not contain a .tar.zst toolchain archive.'
            find .cauli-toolchain-download -maxdepth 3 -type f -print
            exit 1
          fi

          mkdir .cauli-toolchain
          tar --zstd -xf "$archive" -C .cauli-toolchain
          lean_home="$(find "$PWD/.cauli-toolchain" -mindepth 1 -maxdepth 1 -type d -name 'lean-*' -print -quit)"
          if [[ -z "$lean_home" || ! -x "$lean_home/bin/lake" ]]; then
            echo '::error::Could not locate bin/lake in the extracted Cauli toolchain.'
            find .cauli-toolchain -maxdepth 3 -type f -print | head -100
            exit 1
          fi

          echo "LEAN_HOME=$lean_home" >> "$GITHUB_ENV"
          echo "$lean_home/bin" >> "$GITHUB_PATH"

      - name: Verify matching compiler
        run: |
          file "$LEAN_HOME/bin/lean"
          ldd "$LEAN_HOME/bin/lean" || true
          set +e
          version_output="$("$LEAN_HOME/bin/lean" --version 2>&1)"
          version_status=$?
          set -e
          echo "$version_output"
          if [[ "$version_status" != 0 ]]; then
            echo "::warning::Cauli's 32-bit lean --version returned status $version_status after printing its version; validating the printed commit instead."
          fi
          if [[ "$version_output" =~ commit\ ([0-9a-f]{40}) ]]; then
            actual="${BASH_REMATCH[1]}"
          else
            echo '::error::Could not read the Lean commit from --version output.'
            exit 1
          fi
          if [[ "$actual" != "$CAULI_LEAN_SHA" ]]; then
            echo "::error::Expected Lean $CAULI_LEAN_SHA, got $actual"
            exit 1
          fi
          "$LEAN_HOME/bin/lake" --version

      - name: Materialize pinned GameServer dependencies
        run: |
          node scripts/materialize-lake-manifest.mjs server/lake-manifest.json

      - name: Adapt NNG4 package configuration to Cauli Lake
        if: inputs.include_nng4
        run: |
          # NNG4 targets stable Lean 4.28, whose Lake Dependency used an
          # optional String `version?`. The pinned Cauli compiler uses the new
          # InputVer field; keep this compatibility rewrite confined to CI.
          sed -i 's/version? := none/version := .none/' ../NNG4/lakefile.lean
          sed -i 's/version? := s!"git#{leanVersion}"/version := .git leanVersion/' ../NNG4/lakefile.lean
          sed -i "s/^def leanVersion : String :=.*/def leanVersion : String := \"$CAULI_MATHLIB_SHA\"/" ../NNG4/lakefile.lean
          rm -f ../NNG4/lake-manifest.json
          rm -rf ../NNG4/.lake/packages
          (cd ../NNG4 && "$LEAN_HOME/bin/lake" update --keep-toolchain)
          node scripts/migrate-nng4-cauli.mjs ../NNG4

      - name: Enable browser IR generation
        run: |
          node scripts/enable-browser-module-system.mjs --meta \
            server/GameServer.lean \
            server/GameServer \
            server/.lake/packages/importGraph \
            server/.lake/packages/i18n \
            server/.lake/packages/Cli

          node scripts/enable-browser-module-system.mjs \
            server/.lake/packages/batteries \
            ../VisualTest/Game.lean \
            ../VisualTest/Game

          if [[ "${{ inputs.include_nng4 }}" == "true" ]]; then
            node scripts/enable-browser-module-system.mjs --meta \
              ../NNG4/.lake/packages/importGraph \
              ../NNG4/.lake/packages/Cli \
              ../NNG4/.lake/packages/Qq
            node scripts/enable-browser-module-system.mjs \
              ../NNG4/.lake/packages/i18n \
              ../NNG4/.lake/packages/mathlib \
              ../NNG4/.lake/packages/batteries \
              ../NNG4/Game.lean \
              ../NNG4/Game
          fi

          rm -rf server/.lake/build
          find server/.lake/packages -type d -path '*/.lake/build' -prune -exec rm -rf {} +

      - name: Build GameServer browser modules with Cauli Lean
        working-directory: server
        run: |
          "$LEAN_HOME/bin/lake" build GameServer.Browser
          "$LEAN_HOME/bin/lake" build GameServer.Tactic.Click
          "$LEAN_HOME/bin/lake" build GameServer.Tactic.Visual

      - name: Link GameServer dependencies into VisualTest
        run: |
          mkdir -p ../VisualTest/.lake
          ln -s "$GITHUB_WORKSPACE/server/.lake/packages" ../VisualTest/.lake/packages

      - name: Build VisualTest with Cauli Lean
        working-directory: ../VisualTest
        run: |
          "$LEAN_HOME/bin/lake" build

      - name: Build NNG4 with Cauli Lean
        if: inputs.include_nng4
        working-directory: ../NNG4
        run: |
          "$LEAN_HOME/bin/lake" build

      - name: Rebuild NNG4 against browser command surface
        if: inputs.include_nng4
        run: |
          # The first build above runs the native GameServer commands and
          # writes canonical gamedata. Browser proof checking consumes that
          # JSON but must not initialize the metadata/inventory command stack.
          node scripts/retarget-nng4-browser-runtime.mjs ../NNG4
          rm -rf ../NNG4/.lake/build
          (cd ../NNG4 && "$LEAN_HOME/bin/lake" build)

      - name: Package browser libraries
        env:
          INCLUDE_NNG4: ${{ inputs.include_nng4 }}
          LEAN4GAME_REF: ${{ github.sha }}
        run: bash scripts/package-browser-lean-libs.sh browser-lean-libs

      - name: Unpack matching WebAssembly compiler
        run: |
          archive="$(find .cauli-wasm-download -type f -name '*.tar.zst' -print -quit)"
          if [[ -z "$archive" ]]; then
            echo '::error::The Cauli WebAssembly artifact did not contain a .tar.zst toolchain archive.'
            find .cauli-wasm-download -maxdepth 3 -type f -print
            exit 1
          fi

          wasm_root="$RUNNER_TEMP/cauli-wasm"
          mkdir -p "$wasm_root"
          tar --zstd -xf "$archive" -C "$wasm_root"
          wasm_home="$(find "$wasm_root" -mindepth 1 -maxdepth 1 -type d -name 'lean-*' -print -quit)"
          if [[ -z "$wasm_home" || ! -f "$wasm_home/bin/lean.js" || ! -d "$wasm_home/lib/lean" ]]; then
            echo '::error::Could not locate bin/lean.js and lib/lean in the extracted Cauli WebAssembly toolchain.'
            find "$wasm_root" -maxdepth 3 -type f -print | head -100
            exit 1
          fi
          echo "WASM_HOME=$wasm_home" >> "$GITHUB_ENV"

      - name: Use compatible Node with raised WebAssembly module limits
        uses: actions/setup-node@v4
        with:
          # V8 14.1 raises the export cap to 1,000,000 without the exception
          # shim regression seen with Node 26's V8 14.6.
          node-version: 25.9.0

      - name: Set up matching Emscripten linker
        uses: emscripten-core/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984
        with:
          version: 4.0.22

      - name: Link purpose-built Visual Lean WebAssembly runtime
        run: |
          linkkit_archive="$(find .cauli-linkkit-download -type f -name '*.tar.zst' -print -quit)"
          test -n "$linkkit_archive"
          visual_runtime="$RUNNER_TEMP/visual-runtime"
          mkdir -p .visual-link "$visual_runtime/bin" "$visual_runtime/lib"
          echo "VISUAL_RUNTIME=$visual_runtime" >> "$GITHUB_ENV"
          tar --zstd -xf "$linkkit_archive" -C .visual-link
          kit="$PWD/.visual-link/linkkit"

          (cd server && "$LEAN_HOME/bin/lake" env lean ../scripts/PrintVisualExterns.lean)
          node scripts/gen-visual-wasm-exports.mjs \
            "$kit/emscripten-exports.txt" .visual-link/visual-externs.txt \
            .visual-link/visual-exports.txt \
            GameServer.Tactic.Visual .cauli-lean-source/src server --native-c \
            server/.lake/build/ir/GameServer/GoalClick.c \
            server/.lake/build/ir/GameServer/PremiseApplication.c \
            server/.lake/build/ir/GameServer/Browser/ProofProbe.c \
            server/.lake/build/ir/GameServer/Tactic/Visual.c

          objects=()
          for module in GameServer/GoalClick GameServer/PremiseApplication GameServer/Browser/ProofProbe GameServer/Tactic/Visual; do
            source="server/.lake/build/ir/$module.c"
            object=".visual-link/$(basename "$module").o"
            test -f "$source"
            emcc -pthread -DLEAN_EMSCRIPTEN -I "$WASM_HOME/include" -I .cauli-lean-source/src/include \
              -c "$source" -o "$object"
            objects+=("$object")
          done

          emcc -o "$visual_runtime/bin/lean.js" \
            "$kit/libleanmain.a" "$kit/libleanshell.a" "${objects[@]}" \
            -L "$kit" -lleancpp -lInit -lStd -lLean -lnodefs.js -lleanrt "$kit/libuv.a" -lstdc++ \
            -sDISABLE_EXCEPTION_CATCHING=0 -pthread -sALLOW_MEMORY_GROWTH=1 \
            -sINCOMING_MODULE_JS_API=print,printErr,setStatus,locateFile,mainScriptUrlOrBlob,INITIAL_MEMORY,wasmMemory,noInitialRun,preRun,onRuntimeInitialized,onAbort,onExit,arguments,ENV \
            -s EXIT_RUNTIME=0 -s MAIN_MODULE=2 -s ERROR_ON_UNDEFINED_SYMBOLS=0 \
            -sEXPORTED_FUNCTIONS=@.visual-link/visual-exports.txt \
            -sEXPORTED_RUNTIME_METHODS=ccall,callMain,FS,ENV,getValue,setValue,stringToNewUTF8,UTF8ToString,runtimeKeepalivePush \
            -s STACK_SIZE=16777216 -sINITIAL_MEMORY=67108864 -sMAXIMUM_MEMORY=4294967296 -sPTHREAD_POOL_SIZE=4

          ln -s "$WASM_HOME/lib/lean" "$visual_runtime/lib/lean"
          mkdir -p browser-lean-libs/runtime
          cp "$visual_runtime/bin/lean.js" "$visual_runtime/bin/lean.wasm" browser-lean-libs/runtime/
          ls -lh browser-lean-libs/runtime/*

      - name: Isolate NNG WebAssembly imports
        if: inputs.include_nng4
        run: |
          cp -a browser-lean-libs/lean-lib/. "$VISUAL_RUNTIME/lib/lean/"
          mkdir -p .nng-import-probes
          for module in \
            I18n \
            GameServer.Browser.Commands \
            Game.Browser.Metadata \
            Game.Levels.Tutorial.L01rfl
          do
            echo "WASM CLI import probe: $module"
            printf 'import %s\n\nexample : True := True.intro\n' "$module" > .nng-import-probes/probe.lean
            node --stack-size=8192 .cauli-browser-host/scripts/lean-wasm-node.cjs \
              "$VISUAL_RUNTIME" "$PWD/.nng-import-probes" /work/probe.lean
          done

      - name: Bake VisualTest browser environment snapshot
        run: |
          node -p "'Node ' + process.version + ', V8 ' + process.versions.v8"
          cp -a browser-lean-libs/lean-lib/. "$VISUAL_RUNTIME/lib/lean/"
          mkdir -p .visual-snapshot-work browser-lean-libs/snapshots
          # Game metadata and level text are served from generated JSON.  The
          # proof worker only needs the formally checked custom tactic
          # implementation; importing every level into the saved environment
          # needlessly retains their declarations and command elaboration data.
          cat > .visual-snapshot-work/probe.lean <<'LEAN'
          import GameServer.Tactic.Visual

          example (n : Nat) : n = n := by
            click_goal

          -- Exercise the introduction branch in WASM, not merely native Lean.
          -- A broken custom-function ABI can make the simple `rfl` branch pass
          -- while crashing as soon as the tactic manipulates a metavariable.
          example (P : Prop) : P → P := by
            click_goal
            exact h

          example (P Q : Prop) (h : P ↔ Q) (hp : P) : Q := by
            drag_goal h
            exact hp

          example : 0 + 0 = 0 := by
            drag_rw_lhs [Nat.add_zero]
            click_goal
          LEAN

          echo 'Probing VisualTest import in WASM before snapshot save...'
          node --stack-size=8192 .cauli-browser-host/scripts/lean-wasm-node.cjs \
            "$VISUAL_RUNTIME" "$PWD/.visual-snapshot-work" \
            /work/probe.lean

          echo 'Saving VisualTest header snapshot...'
          set +e
          node --stack-size=8192 .cauli-browser-host/scripts/lean-wasm-node.cjs \
            "$VISUAL_RUNTIME" "$PWD/.visual-snapshot-work" \
            '--incr-header-save=/work/game.snap' /work/probe.lean
          snapshot_status=$?
          set -e
          if [[ "$snapshot_status" != 0 ]]; then
            echo "::warning::VisualTest imports successfully in WASM, but snapshot saving failed with status $snapshot_status. Uploading the browser libraries without game.snap."
            exit 0
          fi
          test -s .visual-snapshot-work/game.snap
          echo 'Probing custom tactics after reloading the saved snapshot...'
          node --stack-size=8192 .cauli-browser-host/scripts/lean-wasm-node.cjs \
            "$VISUAL_RUNTIME" "$PWD/.visual-snapshot-work" \
            '--incr-load=/work/game.snap' /work/probe.lean
          echo 'Probing the persistent browser snapshot/compile API...'
          PROBE_NNG4="${{ inputs.include_nng4 }}" node --stack-size=8192 scripts/probe-visual-wasm-api.cjs \
            "$VISUAL_RUNTIME" "$PWD/.visual-snapshot-work"
          mv .visual-snapshot-work/game.snap browser-lean-libs/snapshots/game.snap
          rm -f .visual-snapshot-work/game.snap.deps
          gzip -9 browser-lean-libs/snapshots/game.snap
          ls -lh browser-lean-libs/snapshots/game.snap.gz

      - name: Upload browser libraries
        uses: actions/upload-artifact@v4
        with:
          name: visual-lean-libs-${{ env.CAULI_LEAN_SHA }}
          path: browser-lean-libs
          if-no-files-found: error
          compression-level: 6
          retention-days: 30
