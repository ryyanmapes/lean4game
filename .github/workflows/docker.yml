name: Docker Release Build
run-name: Build and push Docker image

on:
  push:
    branches:
      - main
  # Triggered by NNG4 and VisualTest repos when they push to main.
  # They call the GitHub API with workflow_dispatch; no extra event type needed.
  workflow_dispatch:
    inputs:
      nng4_ref:
        description: "NNG4 branch/tag/SHA to build (default: main)"
        required: false
        default: main
      visualtest_ref:
        description: "VisualTest branch/tag/SHA to build (default: main)"
        required: false
        default: main

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # Check out lean4game into a subdirectory. The Dockerfile build context
      # is the workspace root so all three repos are reachable as siblings.
      - name: Checkout lean4game
        uses: actions/checkout@v4
        with:
          path: lean4game

      - name: Checkout NNG4
        uses: actions/checkout@v4
        with:
          repository: ryyanmapes/NNG4
          ref: ${{ inputs.nng4_ref || 'main' }}
          path: NNG4

      - name: Checkout VisualTest
        uses: actions/checkout@v4
        with:
          repository: ryyanmapes/VisualTest
          ref: ${{ inputs.visualtest_ref || 'main' }}
          path: VisualTest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: lean4game/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lean4game:latest
            ghcr.io/${{ github.repository_owner }}/lean4game:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
